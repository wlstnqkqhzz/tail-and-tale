server:
  port: 8000

spring:
  application:
    name: BE

  profiles:
    active: local

  # ==========================================================================
  # 1. DB
  # ==========================================================================
  datasource:
    url: ${app.datasource.url}
    username: ${app.datasource.username}
    password: ${app.datasource.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==========================================================================
  # 2. JPA
  # ==========================================================================
  jpa:
    hibernate:
      ddl-auto: ${app.jpa.ddl-auto}

    show-sql: ${app.jpa.show-sql}

    properties:
      hibernate:
        format_sql: ${app.jpa.format-sql}

  # ==========================================================================
  # 3. OAuth2
  # ==========================================================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${app.oauth.google.client-id}
            client-secret: ${app.oauth.google.client-secret}
            scope:
              - email
              - profile
          kakao:
            client-id: ${app.oauth.kakao.client-id}
            client-secret: ${app.oauth.kakao.client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
            client-name: Kakao
          naver:
            client-id: ${app.oauth.naver.client-id}
            client-secret: ${app.oauth.naver.client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# ==========================================================================
# 4. JWT
# ==========================================================================
jwt:
  access-secret: ${app.jwt.access-secret}
  refresh-secret: ${app.jwt.refresh-secret}
  access-token-expiration: ${app.jwt.access-token-expiration}
  refresh-token-expiration: ${app.jwt.refresh-token-expiration}

# ==========================================================================
# 5. App
# ==========================================================================
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  animal-registration:
    enabled: ${ANIMAL_REGISTRATION_API_ENABLED:false}
    api-url: ${ANIMAL_REGISTRATION_API_URL:http://apis.data.go.kr/1543061/animalInfoSrvc_v3/animalInfo_v3}
    service-key: ${ANIMAL_REGISTRATION_API_SERVICE_KEY:}
    service-key-param: ${ANIMAL_REGISTRATION_API_SERVICE_KEY_PARAM:serviceKey}
    registration-number-param: ${ANIMAL_REGISTRATION_API_REGISTRATION_NUMBER_PARAM:dog_reg_no}
    owner-name-param: ${ANIMAL_REGISTRATION_API_OWNER_NAME_PARAM:owner_nm}
    response-type-param: ${ANIMAL_REGISTRATION_API_RESPONSE_TYPE_PARAM:_type}
    response-type: ${ANIMAL_REGISTRATION_API_RESPONSE_TYPE:json}
  gemini:
    enabled: ${GEMINI_AI_ENABLED:false}
    api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
