<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Tail &amp; Tale condition 3 - normal</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ears -->
  <ellipse cx="17" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(16 17 31)"/>
  <ellipse cx="47" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(-16 47 31)"/>

  <!-- face -->
  <circle cx="32" cy="32" r="23" fill="#FFF1CC" stroke="#3A2410" stroke-width="2.2" filter="url(#softShadow)"/>


  <!-- eyes -->
  <ellipse cx="23" cy="30" rx="3.1" ry="4.2" fill="#111"/>
  <ellipse cx="41" cy="30" rx="3.1" ry="4.2" fill="#111"/>

  <!-- nose -->
  <ellipse cx="32" cy="37" rx="5.6" ry="4.1" fill="#111"/>
  <!-- neutral mouth -->
  <path d="M32 41 L32 45" stroke="#111" stroke-width="2.7" stroke-linecap="round"/>
  <path d="M25 48 H39" stroke="#111" stroke-width="3" stroke-linecap="round"/>

</svg>
