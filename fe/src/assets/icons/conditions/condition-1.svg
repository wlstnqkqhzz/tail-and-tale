<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Tail &amp; Tale condition 1 - very bad</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ears -->
  <ellipse cx="17" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(16 17 31)"/>
  <ellipse cx="47" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(-16 47 31)"/>

  <!-- face -->
  <circle cx="32" cy="32" r="23" fill="#FFF1CC" stroke="#3A2410" stroke-width="2.2" filter="url(#softShadow)"/>


  <!-- worried marks -->
  <path d="M25 19 C23 16, 20 16, 18 18" fill="none" stroke="#1F1F1F" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M39 19 C41 16, 44 16, 46 18" fill="none" stroke="#1F1F1F" stroke-width="2.4" stroke-linecap="round"/>

  <!-- squeezed eyes -->
  <path d="M21 29 L27 34 M27 29 L21 34" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <path d="M37 29 L43 34 M43 29 L37 34" stroke="#111" stroke-width="3" stroke-linecap="round"/>

  <!-- tears -->
  <path d="M18 35 C13 41, 13 46, 18 47 C23 46, 23 41, 18 35Z" fill="#67C7FF" stroke="#2389C9" stroke-width="1.5"/>
  <path d="M46 35 C41 41, 41 46, 46 47 C51 46, 51 41, 46 35Z" fill="#67C7FF" stroke="#2389C9" stroke-width="1.5"/>

  <!-- nose -->
  <ellipse cx="32" cy="36" rx="5.5" ry="4" fill="#111"/>
  <!-- crying mouth -->
  <path d="M23 50 C27 42, 37 42, 41 50" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>

</svg>
