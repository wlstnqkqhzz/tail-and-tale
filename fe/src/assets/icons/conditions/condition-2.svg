<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Tail &amp; Tale condition 2 - bad</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ears -->
  <ellipse cx="17" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(16 17 31)"/>
  <ellipse cx="47" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(-16 47 31)"/>

  <!-- face -->
  <circle cx="32" cy="32" r="23" fill="#FFF1CC" stroke="#3A2410" stroke-width="2.2" filter="url(#softShadow)"/>


  <!-- droopy brows -->
  <path d="M19 24 C22 22, 25 22, 27 24" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M37 24 C40 22, 43 22, 45 24" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

  <!-- tired eyes -->
  <ellipse cx="23" cy="32" rx="2.8" ry="4.1" fill="#111"/>
  <ellipse cx="41" cy="32" rx="2.8" ry="4.1" fill="#111"/>

  <!-- nose -->
  <ellipse cx="32" cy="37" rx="5.5" ry="4" fill="#111"/>
  <!-- sad mouth -->
  <path d="M24 50 C28 45, 36 45, 40 50" fill="none" stroke="#111" stroke-width="3.3" stroke-linecap="round"/>

</svg>
