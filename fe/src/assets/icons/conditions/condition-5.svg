<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Tail &amp; Tale condition 5 - great</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ears -->
  <ellipse cx="17" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(16 17 31)"/>
  <ellipse cx="47" cy="31" rx="8" ry="18" fill="#B77A32" stroke="#7A4A17" stroke-width="2" transform="rotate(-16 47 31)"/>

  <!-- face -->
  <circle cx="32" cy="32" r="23" fill="#FFF1CC" stroke="#3A2410" stroke-width="2.2" filter="url(#softShadow)"/>


  <!-- big sparkling eyes -->
  <circle cx="23" cy="30" r="5.2" fill="#111"/>
  <circle cx="41" cy="30" r="5.2" fill="#111"/>
  <circle cx="21.5" cy="28" r="1.7" fill="#fff"/>
  <circle cx="39.5" cy="28" r="1.7" fill="#fff"/>
  <circle cx="25" cy="33" r="1.1" fill="#fff"/>
  <circle cx="43" cy="33" r="1.1" fill="#fff"/>

  <!-- blush -->
  <circle cx="18" cy="40" r="4.2" fill="#FF8E8E" opacity="0.9"/>
  <circle cx="46" cy="40" r="4.2" fill="#FF8E8E" opacity="0.9"/>

  <!-- nose -->
  <ellipse cx="32" cy="36" rx="5.4" ry="4" fill="#111"/>
  <!-- open happy mouth -->
  <path d="M24 43 C27 54, 37 54, 40 43 Z" fill="#111"/>
  <path d="M27 49 C30 53, 35 53, 38 49" fill="#FF6F6F"/>

</svg>
